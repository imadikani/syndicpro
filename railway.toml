# Railway cron job definitions.
# Build and deploy commands are configured in the Railway dashboard.
# Both crons require CRON_SECRET and NEXT_PUBLIC_APP_URL as shared variables.

[[crons]]
name     = "generate-charges"
schedule = "0 0 1 * *"
command  = "curl -sf -X POST -H 'Authorization: Bearer $CRON_SECRET' $NEXT_PUBLIC_APP_URL/api/cron/generate-charges"

[[crons]]
name     = "send-reminders"
schedule = "0 9 5 * *"
command  = "curl -sf -X POST -H 'Authorization: Bearer $CRON_SECRET' $NEXT_PUBLIC_APP_URL/api/cron/reminders"
